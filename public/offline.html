<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Practice-BR</title>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: #F7F5F0;
      color: #1C1917;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }
    .card {
      background: #fff;
      border: 1px solid #DDD9D2;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
    }
    .icon { font-size: 2.5rem; }
    h1 {
      font-family: 'Raleway', system-ui, sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #0F3826;
      margin: 16px 0 10px;
    }
    p {
      font-size: 0.92rem;
      color: #5C5853;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    button {
      background: #1A6B4A;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 28px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #0F3826; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1 id="msg-title"></h1>
    <p id="msg-body"></p>
    <button onclick="location.reload()" id="msg-btn"></button>
  </div>
  <script>
    var messages = {
      pt: {
        title: 'Sem conexão',
        body:  'Você está sem conexão. Volte quando estiver online para continuar seus exercícios.',
        btn:   'Tentar novamente'
      },
      en: {
        title: 'No connection',
        body:  'You\'re offline. Come back when you\'re online to continue your exercises.',
        btn:   'Try again'
      },
      fr: {
        title: 'Pas de connexion',
        body:  'Vous êtes hors ligne. Revenez quand vous serez connecté pour continuer vos exercices.',
        btn:   'Réessayer'
      }
    };
    var lang = navigator.language.startsWith('fr') ? 'fr'
             : navigator.language.startsWith('pt') ? 'pt'
             : 'en';
    var m = messages[lang];
    document.getElementById('msg-title').textContent = m.title;
    document.getElementById('msg-body').textContent  = m.body;
    document.getElementById('msg-btn').textContent   = m.btn;
  </script>
</body>
</html>
